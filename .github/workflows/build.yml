name: Build PDF from LaTeX Document

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-cff:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Validate CITATION.cff
      run: |
        pip install cffconvert
        python scripts/validate_cff

  build-latex:
    needs: validate-cff
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

    - name: Make script executable
      run: chmod +x scripts/tex2pdf

    - name: Install Inkscape (required for \includesvg figures)
      run: |
        apt-get update
        apt-get install -y --no-install-recommends inkscape

    - name: Check dependencies
      run: ./scripts/tex2pdf --check

    - name: rebuild PDF and check in if successful 
      run: ./scripts/tex2pdf --github

    - name: Push changes
      run: git push || echo "No changes to push"
